<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Πρωινό Δελτίο Ανάλυσης — 25 Ιουνίου 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #0f1b2d;   /* βαθύ navy — κύρος */
    --paper:      #faf7f0;   /* ζεστό off-white — ξεκούραστο */
    --paper-card: #ffffff;
    --gold:       #b07a2c;   /* κεχριμπαρένιο accent */
    --gold-soft:  #e9d9b8;
    --text:       #1d2b3a;
    --text-soft:  #5a6b7d;
    --line:       #e4ddd0;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 17px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* --- ΕΠΙΚΕΦΑΛΙΔΑ --- */
  .masthead {
    background: var(--ink);
    color: var(--paper);
    padding: 38px 22px 30px;
    text-align: center;
  }
  .masthead .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-bottom: 10px;
  }
  .masthead h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 600;
    font-size: 30px;
    line-height: 1.15;
    margin: 0 0 8px;
  }
  .masthead .date {
    font-style: italic;
    color: var(--gold-soft);
    font-family: 'Fraunces', serif;
    font-size: 17px;
  }

  /* --- ΠΕΡΙΕΧΟΜΕΝΟ --- */
  .wrap { max-width: 720px; margin: 0 auto; padding: 8px 18px 60px; }

  .category { margin-top: 44px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--gold);
    margin-bottom: 22px;
  }
  .category-icon { font-size: 26px; }
  .category-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    margin: 0;
    color: var(--ink);
  }

  /* --- ΚΑΡΤΑ ΑΡΘΡΟΥ --- */
  .card {
    background: var(--paper-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 24px 22px;
    margin-bottom: 22px;
    box-shadow: 0 1px 3px rgba(15,27,45,0.04);
  }
  .card-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 21px;
    line-height: 1.3;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .card-source {
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.03em;
    margin-bottom: 18px;
  }

  .analysis { color: var(--text); }
  .analysis p { margin: 0 0 14px; }
  /* Οι μικροί τίτλοι μέσα στην ανάλυση (🏛 ΠΛΑΙΣΙΟ, 📖 ΠΙΣΩ ΑΠΟ... κ.λπ.) */
  .analysis .block-label {
    display: block;
    font-weight: 600;
    color: var(--ink);
    margin: 20px 0 6px;
    font-size: 15px;
    letter-spacing: 0.02em;
  }

  .source-link {
    display: inline-block;
    margin-top: 12px;
    color: var(--gold);
    font-weight: 600;
    text-decoration: none;
    border-bottom: 1px solid var(--gold-soft);
    padding-bottom: 1px;
  }
  .source-link:hover { border-bottom-color: var(--gold); }

  .footer {
    text-align: center;
    color: var(--text-soft);
    font-size: 13px;
    margin-top: 50px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 480px) {
    body { font-size: 16px; }
    .masthead h1 { font-size: 25px; }
    .card { padding: 20px 17px; }
  }
</style>
</head>
<body>
  <header class="masthead">
    <div class="eyebrow">Πρωινό Δελτίο Ανάλυσης</div>
    <h1>Πίσω από τις Γραμμές</h1>
    <div class="date">25 Ιουνίου 2026</div>
  </header>
  <main class="wrap">
    
    <div class="footer">
      Αυτόματη ανάλυση · Δημιουργήθηκε για προσωπική χρήση<br>
      Ανάλυση, όχι είδηση — εργαλεία σκέψης για κάθε πρωί
    </div>
  </main>
</body>
</html>
